work_dir: workspace
cache_db: workspace/cache.db
input_dir: inbox
output_dir: library
ocr:
  # paddle_pp (CPU, ~1.5GB) | rapid_ocr (~50MB) | cloud_ocr (remote API) | paddle_vl (GPU)
  backend: paddle_pp
  dpi: 200
  use_table_recognition: false
  use_formula_recognition: false
  use_region_detection: true
postprocess:
  drop_header_footer: true
  merge_cross_page: true
  infer_title_level: true
epub:
  toc_depth: 2
  chapter_level: 1
ai_review:
  enabled: false
  api_url: ${PDF2BOOK_API_URL:-https://api.openai.com/v1/chat/completions}
  api_key: ${PDF2BOOK_API_KEY:-}
  model: gpt-4o-mini
  max_tokens: 8192
  max_retries: 3
  timeout: 90.0
  multimodal: false
  max_images: 8
