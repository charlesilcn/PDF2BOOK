<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始配置 - PDF2BOOK</title>
    <link rel="stylesheet" href="../colors_and_type.css">
    <link rel="stylesheet" href="../components.css">
    <style>
*,*::before,*::after{box-sizing:border-box;border-width:0;border-style:solid}
html{-webkit-text-size-adjust:100%;tab-size:4}
body{margin:0;padding:0;line-height:inherit;font-family:var(--font-sans,ui-sans-serif,system-ui,sans-serif);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:var(--background);color:var(--foreground);overflow:hidden;height:100vh}
h1,h2,h3,h4,h5,h6{font-size:inherit;font-weight:inherit;margin:0}
p{margin:0}
a{color:inherit;text-decoration:inherit}
button,input,select,textarea{font-family:inherit;font-size:100%;font-weight:inherit;line-height:inherit;color:inherit;margin:0;padding:0;background:transparent;border:0}
button{cursor:pointer;-webkit-appearance:button}
input,select,textarea{outline:none}
code{font-family:var(--font-mono,ui-monospace,monospace)}
ul{list-style:none;margin:0;padding:0}
[hidden]{display:none!important}
:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.flex{display:flex}.inline-flex{display:inline-flex}.grid{display:grid}.block{display:block}.hidden{display:none}
.flex-1{flex:1 1 0%}.shrink-0{flex-shrink:0}.flex-col{flex-direction:column}
.items-center{align-items:center}.items-start{align-items:flex-start}.justify-center{justify-content:center}.justify-between{justify-content:space-between}
.gap-1{gap:.25rem}.gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-2\.5{gap:.625rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-3{padding-left:.75rem;padding-right:.75rem}.px-4{padding-left:1rem;padding-right:1rem}.px-5{padding-left:1.25rem;padding-right:1.25rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-1\.5{padding-top:.375rem;padding-bottom:.375rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-3{padding-top:.75rem;padding-bottom:.75rem}
.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}
.text-xs{font-size:11px;line-height:1rem}.text-sm{font-size:13px;line-height:1.35}.text-base{font-size:14px}.text-lg{font-size:16px}
.font-mono{font-family:var(--font-mono,ui-monospace,monospace)}
.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}
.rounded{border-radius:var(--radius,8px)}.rounded-full{border-radius:9999px}
.w-full{width:100%}.h-full{height:100%}.min-w-0{min-width:0}
.overflow-hidden{overflow:hidden}.overflow-auto{overflow:auto}
.whitespace-nowrap{white-space:nowrap}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.border{border:1px solid var(--border)}.border-t{border-top:1px solid var(--border)}.border-b{border-bottom:1px solid var(--border)}
.relative{position:relative}.absolute{position:absolute}
.col-span-2{grid-column:span 2/span 2}
.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}
.mb-1{margin-bottom:.25rem}.mb-1\.5{margin-bottom:.375rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}
.mr-1{margin-right:.25rem}.ml-auto{margin-left:auto}.-ml-2{margin-left:-.5rem}
.leading-tight{line-height:1.25}
    </style>
</head>
<body>
    <main class="flex flex-col h-full" style="height:100vh;background:var(--background);">
        <!-- Top bar (compact 48px) -->
        <header class="flex items-center justify-between gap-3 px-5 shrink-0" style="height:48px;border-bottom:1px solid var(--border);background:var(--background);">
            <a href="/" data-dom-id="back-welcome" class="inline-flex items-center gap-1.5 px-2 -ml-2" style="height:32px;border-radius:var(--radius);color:var(--foreground);background:transparent;border:1px solid transparent;cursor:pointer;font:500 13px/1 var(--font-sans);transition:background-color .15s ease;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                <span>返回</span>
            </a>
            <div class="flex items-center gap-2 flex-1 justify-center" style="max-width:280px;">
                <span class="text-xs font-medium" style="color:var(--muted-foreground);white-space:nowrap;">配置向导</span>
                <div class="flex items-center gap-1.5 flex-1">
                    <span style="width:7px;height:7px;border-radius:999px;background:var(--foreground);"></span>
                    <span style="flex:1;height:1px;background:var(--foreground);"></span>
                    <span style="width:7px;height:7px;border-radius:999px;background:var(--foreground);position:relative;">
                        <span style="position:absolute;inset:-3px;border-radius:999px;border:1.5px solid var(--ring);"></span>
                    </span>
                    <span style="flex:1;height:1px;background:var(--border);"></span>
                    <span style="width:7px;height:7px;border-radius:999px;background:var(--border);"></span>
                </div>
                <span class="text-xs font-mono" style="color:var(--muted-foreground);white-space:nowrap;">2/3</span>
            </div>
            <a href="/pages/dashboard" class="px-3" style="height:32px;border-radius:var(--radius);color:var(--muted-foreground);background:transparent;border:1px solid transparent;cursor:pointer;font:500 12px/1 var(--font-sans);transition:color .15s ease;">跳过</a>
        </header>

        <!-- Main content area - fills remaining space, no scroll on desktop -->
        <div class="flex-1 flex flex-col overflow-hidden px-5 py-4" style="min-height:0;">
            <!-- Compact heading -->
            <div class="flex items-baseline gap-3 mb-3 shrink-0">
                <h1 style="font:600 18px/1.2 var(--font-sans);letter-spacing:-.01em;">配置工作环境</h1>
                <span style="font:500 12px/1 var(--font-mono);color:var(--muted-foreground);">选择OCR引擎 · 配置AI审查 · 设置目录</span>
            </div>

            <!-- Two-column grid for content -->
            <div class="grid gap-3 flex-1" style="grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;min-height:0;">
                <!-- Left column: OCR Engine + Dependency status -->
                <article class="flex flex-col p-4" style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);min-height:0;overflow:auto;">
                    <div class="flex items-center justify-between gap-2 mb-2">
                        <div class="flex items-center gap-2">
                            <span style="font:600 10px/1 var(--font-mono);color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.06em;">核心组件</span>
                            <h3 style="font:600 14px/1 var(--font-sans);">OCR 引擎</h3>
                        </div>
                        <span class="inline-flex items-center gap-1 whitespace-nowrap" style="padding:2px 8px;border-radius:999px;background:var(--success-subtle);color:var(--success-strong);font:500 11px/1 var(--font-sans);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px;"><path d="M20 6 9 17l-5-5"/></svg>
                            已就绪
                        </span>
                    </div>

                    <!-- OCR options: 2x2 compact grid -->
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <!-- PaddleOCR PP-StructureV3 (selected) -->
                        <label class="ocr-card selected cursor-pointer flex flex-col p-2.5" style="border:1.5px solid var(--ring);border-radius:var(--radius);background:color-mix(in srgb,var(--accent) 30%,var(--card));transition:border-color .15s ease;">
                            <input type="radio" name="ocr-engine" value="paddle" class="sr-only" checked>
                            <div class="flex items-center gap-1.5 mb-1">
                                <span style="width:10px;height:10px;border-radius:999px;border:2px solid var(--ring);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <span style="width:4px;height:4px;border-radius:999px;background:var(--foreground);"></span>
                                </span>
                                <span style="font:600 12px/1 var(--font-sans);">PaddleOCR V3</span>
                                <span style="padding:1px 5px;border-radius:4px;background:var(--success-subtle);color:var(--success-strong);font:600 9px/1 var(--font-mono);text-transform:uppercase;letter-spacing:.03em;">推荐</span>
                            </div>
                            <p style="color:var(--muted-foreground);font-size:11px;line-height:1.4;margin-bottom:4px;">高精度中文识别，支持版面分析</p>
                            <code style="padding:2px 6px;border-radius:3px;background:var(--muted);color:var(--muted-foreground);font:500 10px/1.3 var(--font-mono);align-self:flex-start;">pip install 'pdf2book[ocr]'</code>
                        </label>

                        <!-- RapidOCR -->
                        <label class="ocr-card cursor-pointer flex flex-col p-2.5" style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);transition:border-color .15s ease;">
                            <input type="radio" name="ocr-engine" value="rapid" class="sr-only">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span style="width:10px;height:10px;border-radius:999px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;"></span>
                                <span style="font:600 12px/1 var(--font-sans);">RapidOCR</span>
                                <span style="padding:1px 5px;border-radius:4px;background:var(--secondary);color:var(--muted-foreground);font:500 9px/1 var(--font-sans);">轻量</span>
                            </div>
                            <p style="color:var(--muted-foreground);font-size:11px;line-height:1.4;margin-bottom:4px;">快速轻量，CPU友好</p>
                            <code style="padding:2px 6px;border-radius:3px;background:var(--muted);color:var(--muted-foreground);font:500 10px/1.3 var(--font-mono);align-self:flex-start;">pip install 'pdf2book[rapid]'</code>
                        </label>

                        <!-- PaddleOCR-VL -->
                        <label class="ocr-card cursor-pointer flex flex-col p-2.5" style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);transition:border-color .15s ease;">
                            <input type="radio" name="ocr-engine" value="paddle-vl" class="sr-only">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span style="width:10px;height:10px;border-radius:999px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;"></span>
                                <span style="font:600 12px/1 var(--font-sans);">PaddleOCR-VL</span>
                                <span style="padding:1px 5px;border-radius:4px;background:var(--secondary);color:var(--muted-foreground);font:500 9px/1 var(--font-sans);">GPU</span>
                            </div>
                            <p style="color:var(--muted-foreground);font-size:11px;line-height:1.4;margin-bottom:4px;">视觉语言模型，需NVIDIA GPU</p>
                            <code style="padding:2px 6px;border-radius:3px;background:var(--muted);color:var(--muted-foreground);font:500 10px/1.3 var(--font-mono);align-self:flex-start;">pip install paddleocr-vl</code>
                        </label>

                        <!-- 云端 OCR -->
                        <label class="ocr-card cursor-pointer flex flex-col p-2.5" style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);transition:border-color .15s ease;">
                            <input type="radio" name="ocr-engine" value="cloud" class="sr-only">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span style="width:10px;height:10px;border-radius:999px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;"></span>
                                <span style="font:600 12px/1 var(--font-sans);">云端 OCR</span>
                                <span style="padding:1px 5px;border-radius:4px;background:var(--secondary);color:var(--muted-foreground);font:500 9px/1 var(--font-sans);">API</span>
                            </div>
                            <p style="color:var(--muted-foreground);font-size:11px;line-height:1.4;margin-bottom:4px;">需API配置，无需本地模型</p>
                        </label>
                    </div>

                    <!-- Dependency status - compact inline -->
                    <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:auto;">
                        <div class="text-xs font-medium mb-1.5" style="color:var(--muted-foreground);font-size:11px;">依赖检测</div>
                        <div class="flex flex-wrap gap-x-4 gap-y-1">
                            <div class="flex items-center gap-1.5">
                                <span style="width:14px;height:14px;border-radius:999px;background:var(--success-subtle);color:var(--success-strong);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:8px;height:8px;"><path d="M20 6 9 17l-5-5"/></svg>
                                </span>
                                <span style="font-size:11px;color:var(--foreground);">Gradio</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <span style="width:14px;height:14px;border-radius:999px;background:var(--success-subtle);color:var(--success-strong);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:8px;height:8px;"><path d="M20 6 9 17l-5-5"/></svg>
                                </span>
                                <span style="font-size:11px;color:var(--foreground);">OCR · PaddleOCR</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <span style="width:14px;height:14px;border-radius:999px;background:var(--success-subtle);color:var(--success-strong);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:8px;height:8px;"><path d="M20 6 9 17l-5-5"/></svg>
                                </span>
                                <span style="font-size:11px;color:var(--foreground);">Pandoc</span>
                            </div>
                        </div>
                    </div>
                </article>

                <!-- Right column: AI config + Paths (stacked) -->
                <div class="flex flex-col gap-3 min-h-0 overflow-auto">
                    <!-- AI Review Config -->
                    <article class="flex flex-col p-4 shrink-0" style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);">
                        <div class="flex items-center justify-between gap-2 mb-2">
                            <div class="flex items-center gap-2">
                                <span style="font:600 10px/1 var(--font-mono);color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.06em;">AI 功能</span>
                                <h3 style="font:600 14px/1 var(--font-sans);">AI 智能审查</h3>
                                <span style="font-size:11px;color:var(--muted-foreground);">可选</span>
                            </div>
                            <button class="toggle-input is-on focusable" id="ai-toggle" role="switch" aria-checked="true" style="display:flex;align-items:center;background:transparent;border:0;cursor:pointer;padding:0;flex-shrink:0;">
                                <span class="toggle-core" style="width:30px;height:17px;border-radius:999px;background:var(--primary);padding:2px;display:flex;align-items:center;transition:background-color .18s ease;">
                                    <span style="width:13px;height:13px;border-radius:999px;background:var(--card);display:block;transform:translateX(13px);transition:transform .18s ease;box-shadow:0 1px 2px rgba(0,0,0,.2);"></span>
                                </span>
                            </button>
                        </div>

                        <div id="ai-fields" class="flex flex-col gap-2">
                            <!-- API Key + URL in 2-col grid -->
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs mb-1" style="color:var(--muted-foreground);font-size:11px;">API Key</label>
                                    <div class="flex items-center gap-2 px-2.5" style="height:32px;border:1px solid var(--input);border-radius:var(--radius);background:var(--background);">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted-foreground);flex-shrink:0;"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>
                                        <input type="password" placeholder="sk-..." style="width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:12px;font-family:var(--font-sans);">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs mb-1" style="color:var(--muted-foreground);font-size:11px;">API URL</label>
                                    <div class="flex items-center gap-2 px-2.5" style="height:32px;border:1px solid var(--input);border-radius:var(--radius);background:var(--background);">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted-foreground);flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                                        <input type="text" placeholder="默认 OpenAI" style="width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:12px;font-family:var(--font-sans);">
                                    </div>
                                </div>
                            </div>
                            <!-- Model selector -->
                            <div>
                                <label class="block text-xs mb-1" style="color:var(--muted-foreground);font-size:11px;">模型</label>
                                <div class="flex items-center gap-2 px-2.5" style="height:32px;border:1px solid var(--input);border-radius:var(--radius);background:var(--background);cursor:pointer;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted-foreground);flex-shrink:0;"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
                                    <select style="width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:12px;font-family:var(--font-sans);appearance:none;cursor:pointer;">
                                        <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
                                        <option value="gpt-4o">gpt-4o</option>
                                        <option value="deepseek-chat">deepseek-chat</option>
                                    </select>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;color:var(--muted-foreground);flex-shrink:0;"><path d="m6 9 6 6 6-6"/></svg>
                                </div>
                            </div>
                            <p style="color:var(--muted-foreground);font-size:11px;line-height:1.4;">AI自动修正OCR错误、优化段落排版。Key保存在本地 <code style="padding:1px 4px;border-radius:3px;background:var(--muted);font:500 10px var(--font-mono);">.env</code> 文件。</p>
                        </div>
                    </article>

                    <!-- Path Settings -->
                    <article class="flex flex-col p-4 flex-1" style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);min-height:0;">
                        <div class="mb-2">
                            <span style="font:600 10px/1 var(--font-mono);color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.06em;">工作目录</span>
                            <h3 style="font:600 14px/1 var(--font-sans);display:inline;margin-left:6px;">路径设置</h3>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div>
                                <label class="block text-xs mb-1" style="color:var(--muted-foreground);font-size:11px;">PDF 输入</label>
                                <div class="flex items-center gap-2 px-2.5" style="height:32px;border:1px solid var(--input);border-radius:var(--radius);background:var(--background);">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted-foreground);flex-shrink:0;"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m15 13-3 3-3-3"/></svg>
                                    <input type="text" value="inbox/" style="width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:12px;font-family:var(--font-mono);">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs mb-1" style="color:var(--muted-foreground);font-size:11px;">EPUB 输出</label>
                                    <div class="flex items-center gap-2 px-2.5" style="height:32px;border:1px solid var(--input);border-radius:var(--radius);background:var(--background);">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted-foreground);flex-shrink:0;"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m9 13 3-3 3 3"/></svg>
                                        <input type="text" value="library/" style="width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:12px;font-family:var(--font-mono);">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs mb-1" style="color:var(--muted-foreground);font-size:11px;">工作区</label>
                                    <div class="flex items-center gap-2 px-2.5" style="height:32px;border:1px solid var(--input);border-radius:var(--radius);background:var(--background);">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted-foreground);flex-shrink:0;"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                                        <input type="text" value="workspace/" style="width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:12px;font-family:var(--font-mono);">
                                    </div>
                                </div>
                            </div>
                            <!-- Tip -->
                            <div class="flex items-start gap-2 mt-1 p-2" style="border-radius:var(--radius);background:color-mix(in srgb,var(--chart-2) 8%,transparent);">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--chart-2);flex-shrink:0;margin-top:1px;"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                                <p style="font-size:11px;color:var(--muted-foreground);line-height:1.4;">配置可稍后在设置中修改。AI审查为可选项，不配置也能完成基础转换。</p>
                            </div>
                        </div>
                    </article>
                </div>
            </div>
        </div>

        <!-- Bottom action bar (compact 48px) -->
        <footer class="shrink-0 flex items-center justify-between gap-3 px-5" style="height:48px;border-top:1px solid var(--border);background:var(--background);">
            <button class="inline-flex items-center gap-1.5 px-3" style="height:34px;border:1px solid var(--border);border-radius:var(--radius);background:var(--secondary);color:var(--secondary-foreground);font:500 12px/1 var(--font-sans);cursor:pointer;transition:background-color .15s ease;white-space:nowrap;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                <span>刷新状态</span>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-xs" style="color:var(--success);font-size:11px;">所有核心组件已就绪</span>
                <a href="/pages/dashboard" data-dom-id="enter-app" class="inline-flex items-center gap-1.5 px-5" style="height:34px;border:1px solid transparent;border-radius:var(--radius);background:var(--primary);color:var(--primary-foreground);font:600 13px/1 var(--font-sans);cursor:pointer;transition:background-color .15s ease;box-shadow:var(--shadow-xs);white-space:nowrap;">
                    <span>进入主界面</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
            </div>
        </footer>
    </main>

    <style>
        .onboard-btn:hover { background: var(--accent) !important; color: var(--accent-foreground) !important; }
        .onboard-btn:focus-visible { outline: 0; box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring); }
        .onboard-enter:hover:not(:disabled) { background: var(--foreground) !important; }
        .onboard-enter:focus-visible { outline: 0; box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring); }
        .onboard-input:focus-within { border-color: var(--ring) !important; box-shadow: 0 0 0 2px var(--background), 0 0 0 3px color-mix(in srgb, var(--ring) 25%, transparent); }
        .ocr-card:hover:not(.selected) { border-color: var(--accent-foreground) !important; }
        .toggle-input:focus-visible { outline: 0; }
        .toggle-input:focus-visible .toggle-core { box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring); }
        select option { background: var(--card); color: var(--foreground); }
        @media (max-height: 700px) {
            .flex-1.flex.flex-col.overflow-hidden.px-5.py-4 { padding-top: 10px; padding-bottom: 10px; }
            article { padding: 12px !important; }
            .mb-3 { margin-bottom: 8px !important; }
            .mb-2 { margin-bottom: 6px !important; }
            .gap-3 { gap: 8px !important; }
        }
    </style>
    <script>
        // OCR radio card selection
        document.querySelectorAll('.ocr-card').forEach(function(card) {
            card.addEventListener('click', function(e) {
                if (e.target.closest('input') || e.target.closest('code')) return;
                var radio = card.querySelector('input[type="radio"]');
                if (radio) radio.checked = true;
                document.querySelectorAll('.ocr-card').forEach(function(c) {
                    c.classList.remove('selected');
                    c.style.borderColor = 'var(--border)';
                    c.style.borderWidth = '1px';
                    c.style.background = 'var(--card)';
                    var dot = c.querySelector('span > span:first-child');
                    if (dot) {
                        dot.style.borderColor = 'var(--border)';
                        dot.innerHTML = '';
                    }
                });
                card.classList.add('selected');
                card.style.borderColor = 'var(--ring)';
                card.style.borderWidth = '1.5px';
                card.style.background = 'color-mix(in srgb,var(--accent) 30%,var(--card))';
                var dot = card.querySelector('span > span:first-child');
                if (dot) {
                    dot.style.borderColor = 'var(--ring)';
                    dot.innerHTML = '<span style="width:4px;height:4px;border-radius:999px;background:var(--foreground);"></span>';
                }
            });
        });
        // AI toggle
        var aiToggle = document.getElementById('ai-toggle');
        if (aiToggle) {
            aiToggle.addEventListener('click', function() {
                var isOn = aiToggle.classList.toggle('is-on');
                var core = aiToggle.querySelector('.toggle-core');
                var knob = core.querySelector('span');
                aiToggle.setAttribute('aria-checked', isOn ? 'true' : 'false');
                core.style.background = isOn ? 'var(--primary)' : 'var(--accent)';
                knob.style.transform = isOn ? 'translateX(13px)' : 'translateX(0)';
                var fields = document.getElementById('ai-fields');
                if (fields) { fields.style.opacity = isOn ? '1' : '0.35'; fields.style.pointerEvents = isOn ? 'auto' : 'none'; }
            });
        }
    </script>
</body>
</html>
