<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">

    <title>欢迎使用 PDF2BOOK</title>

    <style>
/* base styles */
*,*::before,*::after{box-sizing:border-box;border-width:0;border-style:solid}
html{-webkit-text-size-adjust:100%;tab-size:4;font-feature-settings:normal}
body{margin:0;padding:0;line-height:inherit;font-family:var(--font-sans,ui-sans-serif,system-ui,sans-serif);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:var(--background);color:var(--foreground)}
hr{height:0;color:inherit;border-top-width:1px}
abbr:where([title]){text-decoration:underline dotted}
h1,h2,h3,h4,h5,h6{font-size:inherit;font-weight:inherit}
a{color:inherit;text-decoration:inherit}
b,strong{font-weight:bolder}
code,kbd,samp,pre{font-family:var(--font-mono,ui-monospace,monospace);font-size:1em}
small{font-size:80%}
sub,sup{font-size:75%;line-height:0;position:relative;vertical-align:baseline}
table{text-indent:0;border-color:inherit;border-collapse:collapse}
button,input,optgroup,select,textarea{font-family:inherit;font-feature-settings:inherit;font-variation-settings:inherit;font-size:100%;font-weight:inherit;line-height:inherit;color:inherit;margin:0;padding:0}
button,select{text-transform:none}
button,[type=button],[type=reset],[type=submit]{-webkit-appearance:button;background-color:transparent;background-image:none}
:-moz-focusring{outline:auto}
:-moz-ui-invalid{box-shadow:none}
progress{vertical-align:baseline}
::-webkit-inner-spin-button,::-webkit-outer-spin-button{height:auto}
[type=search]{-webkit-appearance:textfield;outline-offset:-2px}
::-webkit-search-decoration{-webkit-appearance:none}
::-webkit-file-upload-button{-webkit-appearance:button;font:inherit}
summary{display:list-item}
blockquote,dl,dd,h1,h2,h3,h4,h5,h6,hr,figure,p,pre{margin:0}
fieldset{margin:0;padding:0}
legend{padding:0}
ol,ul,menu{list-style:none;margin:0;padding:0}
dialog{padding:0}
textarea{resize:vertical}
input::placeholder,textarea::placeholder{opacity:1;color:var(--muted-foreground,#737373)}
[role=button],button{cursor:pointer}
:disabled{cursor:default}
img,svg,video,canvas,audio,iframe,embed,object{display:block;vertical-align:middle}
img,video{max-width:100%;height:auto}
[hidden]{display:none!important}
:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
/* utilities */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.flex{display:flex}.inline-flex{display:inline-flex}.grid{display:grid}.block{display:block}.inline-block{display:inline-block}.hidden{display:none}
.flex-1{flex:1 1 0%}.shrink-0{flex-shrink:0}.flex-shrink-0{flex-shrink:0}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}.items-start{align-items:flex-start}.items-end{align-items:flex-end}
.justify-center{justify-content:center}.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}
.gap-1{gap:.25rem}.gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-2\.5{gap:.625rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}.gap-6{gap:1.5rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-3{padding-left:.75rem;padding-right:.75rem}.px-4{padding-left:1rem;padding-right:1rem}.px-5{padding-left:1.25rem;padding-right:1.25rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-1\.5{padding-top:.375rem;padding-bottom:.375rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-3{padding-top:.75rem;padding-bottom:.75rem}.py-8{padding-top:2rem;padding-bottom:2rem}
.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}
.text-xs{font-size:12px;line-height:1rem}.text-sm{font-size:13px;line-height:1.25rem}.text-base{font-size:14px;line-height:1.5rem}.text-lg{font-size:18px}.text-xl{font-size:20px}
.font-sans{font-family:var(--font-sans,ui-sans-serif,system-ui,sans-serif)}.font-mono{font-family:var(--font-mono,ui-monospace,monospace)}
.font-normal{font-weight:400}.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}
.antialiased{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.tracking-tight{letter-spacing:-0.025em}
.rounded{border-radius:var(--radius,8px)}.rounded-md{border-radius:calc(var(--radius,8px) - 2px)}.rounded-sm{border-radius:calc(var(--radius,8px) - 4px)}.rounded-full{border-radius:9999px}
.w-full{width:100%}.h-full{height:100%}.min-h-screen{min-height:100vh}.min-w-0{min-width:0}
.overflow-hidden{overflow:hidden}.overflow-auto{overflow:auto}.overflow-x-auto{overflow-x:auto}
.whitespace-nowrap{white-space:nowrap}
.text-center{text-align:center}.text-left{text-align:left}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.border{border:1px solid var(--border)}.border-t{border-top:1px solid var(--border)}.border-b{border-bottom:1px solid var(--border)}.border-l{border-left:1px solid var(--border)}.border-r{border-right:1px solid var(--border)}
.bg-transparent{background:transparent}
.transition-colors{transition:background-color .15s ease,color .15s ease,border-color .15s ease}
.duration-200{transition-duration:.2s}
.cursor-pointer{cursor:pointer}.cursor-grab{cursor:grab}.cursor-grabbing{cursor:grabbing}
.select-none{user-select:none}
.opacity-0{opacity:0}.opacity-50{opacity:.5}.opacity-70{opacity:.7}
.pointer-events-none{pointer-events:none}
.relative{position:relative}.absolute{position:absolute}.fixed{position:fixed}.sticky{position:sticky}
.top-0{top:0}.left-0{left:0}.right-0{right:0}.bottom-0{bottom:0}
.z-10{z-index:10}.z-20{z-index:20}.z-50{z-index:50}
.inset-0{inset:0}
.w-3{width:.75rem}.w-4{width:1rem}.w-5{width:1.25rem}.w-6{width:1.5rem}.w-8{width:2rem}.w-9{width:2.25rem}.w-10{width:2.5rem}.w-12{width:3rem}
.h-3{height:.75rem}.h-4{height:1rem}.h-5{height:1.25rem}.h-6{height:1.5rem}.h-8{height:2rem}.h-9{height:2.25rem}.h-10{height:2.5rem}.h-12{height:3rem}
.max-w-xs{max-width:20rem}.max-w-sm{max-width:24rem}.max-w-md{max-width:28rem}.max-w-lg{max-width:32rem}.max-w-xl{max-width:36rem}
.aspect-video{aspect-ratio:16/9}
.object-cover{object-fit:cover}
.grid-cols-1{grid-template-columns:repeat(1,minmax(0,1fr))}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.col-span-2{grid-column:span 2/span 2}
.space-y-1>*+*{margin-top:.25rem}.space-y-2>*+*{margin-top:.5rem}.space-y-3>*+*{margin-top:.75rem}.space-y-4>*+*{margin-top:1rem}
.space-x-1>*+*{margin-left:.25rem}.space-x-2>*+*{margin-left:.5rem}
.mx-auto{margin-left:auto;margin-right:auto}
.mt-0\.5{margin-top:.125rem}.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-4{margin-top:1rem}.mt-6{margin-top:1.5rem}
.mb-1{margin-bottom:.25rem}.mb-1\.5{margin-bottom:.375rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-8{margin-bottom:2rem}
.ml-1{margin-left:.25rem}.ml-2{margin-left:.5rem}.ml-auto{margin-left:auto}.-ml-2{margin-left:-.5rem}
.mr-1{margin-right:.25rem}.mr-2{margin-right:.5rem}
.leading-none{line-height:1}.leading-relaxed{line-height:1.625}.leading-tight{line-height:1.25}
@media (min-width: 640px){.sm\:px-6{padding-left:1.5rem;padding-right:1.5rem}.sm\:py-10{padding-top:2.5rem;padding-bottom:2.5rem}}
    </style>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="welcome-shell">
        <div class="welcome-bg" aria-hidden="true"></div>
        <div class="welcome-content">
            <!-- Logo -->
            <div class="welcome-logo">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/>
                </svg>
            </div>

            <!-- Product name -->
            <h1 class="welcome-title" style="text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">PDF2BOOK</h1>

            <!-- Tagline -->
            <p class="welcome-tagline">将扫描PDF转换为 Kindle 友好的 EPUB</p>

            <!-- Feature grid -->
            <div class="welcome-features">
                <div class="welcome-feature">
                    <div class="welcome-feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
                            <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
                            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
                            <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
                            <path d="M7 12h10"/>
                        </svg>
                    </div>
                    <div class="welcome-feature-body">
                        <div class="welcome-feature-title">OCR智能识别</div>
                        <div class="welcome-feature-desc">PaddleOCR / RapidOCR 高精度文字识别</div>
                    </div>
                </div>
                <div class="welcome-feature">
                    <div class="welcome-feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>

                    </div>
                    <div class="welcome-feature-body">
                        <div class="welcome-feature-title">AI辅助排版</div>
                        <div class="welcome-feature-desc">自动修正识别错误，优化阅读体验</div>
                    </div>
                </div>
                <div class="welcome-feature">
                    <div class="welcome-feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                    </div>
                    <div class="welcome-feature-body">
                        <div class="welcome-feature-title">Kindle适配</div>
                        <div class="welcome-feature-desc">生成适合电子墨水屏的 EPUB</div>
                    </div>
                </div>

                    <div class="welcome-feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
                        </svg>
                    </div>
                    <div class="welcome-feature-body">
                        <div class="welcome-feature-title">批量处理</div>

            </div>

            <!-- CTA -->
            <a href="/pages/onboarding" class="welcome-cta" data-dom-id="get-started">开始配置</a>
            <a href="/pages/dashboard" class="welcome-ghost">已有配置？直接进入</a>

            <!-- Version -->
            <div class="welcome-version">v0.1.0</div>
        </div>
    </main>
    <style>
        /* Override components.css body padding that leaks from preview styles */
        body { padding: 0 !important; margin: 0 !important; }

        .welcome-shell {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 48px 24px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .welcome-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, color-mix(in srgb, var(--chart-2) 5%, transparent), transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 120%, color-mix(in srgb, var(--chart-2) 3%, transparent), transparent 70%);
        }

        .welcome-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: welcomeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .welcome-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--foreground);
            margin-bottom: 32px;
        }

        .welcome-title {
            margin: 0;
            font-family: var(--font-sans);
            font-size: clamp(36px, 5vw, 40px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--foreground);
        }

        .welcome-tagline {
            margin: 12px 0 0;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--muted-foreground);
        }

        .welcome-features {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            width: 100%;
            margin: 40px 0 32px;
        }

        .welcome-feature {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            text-align: left;
            transition: border-color 0.16s ease, background-color 0.16s ease;
        }

        .welcome-feature:hover {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--card) 80%, var(--accent) 20%);
        }

        .welcome-feature-icon {
            flex: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: calc(var(--radius) - 2px);
            background: var(--secondary);
            color: var(--foreground);
        }

        .welcome-feature-body {
            min-width: 0;
            padding-top: 2px;
        }

        .welcome-feature-title {
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            color: var(--foreground);
            margin-bottom: 4px;
        }

        .welcome-feature-desc {
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--muted-foreground);
        }

        .welcome-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 280px;
            height: 44px;
            padding: 0 24px;
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            background: var(--primary);
            color: var(--primary-foreground);
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: var(--tracking-normal);
            white-space: nowrap;
            cursor: pointer;
            transition: background-color 0.16s ease, border-color 0.16s ease, color 0.16s ease;
        }

        .welcome-cta:hover {
            background: var(--foreground);
            border-color: var(--foreground);
        }

        .welcome-cta:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring);
        }

        .welcome-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            background: transparent;
            color: var(--muted-foreground);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            cursor: pointer;
            transition: color 0.16s ease, background-color 0.16s ease;
        }

        .welcome-ghost:hover {
            color: var(--foreground);
            background: var(--accent);
        }

        .welcome-version {
            margin-top: 32px;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--muted-foreground);
            letter-spacing: 0.02em;
        }

        @keyframes welcomeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .welcome-content {
                animation: none;
            }
        }

        @media (max-width: 480px) {
            .welcome-shell {
                padding: 32px 20px;
            }
            .welcome-features {
                grid-template-columns: 1fr;
                gap: 8px;
                margin: 32px 0 28px;
            }
            .welcome-logo {
                width: 64px;
                height: 64px;
                margin-bottom: 28px;
            }
        }
    </style>
    </body>
</html>
